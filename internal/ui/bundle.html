<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doug Plan — Review</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 4px; }
    p { margin-top: 4px; color: #555; }
    textarea { width: 100%; height: 480px; font-family: monospace; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 10px; padding: 8px 28px; font-size: 16px; cursor: pointer; }
    #status { margin-top: 8px; color: #080; }
  </style>
</head>
<body>
  <h1 id="stage">Loading…</h1>
  <p>Review and edit the artifact below, then click <strong>Approve</strong> to advance the pipeline.</p>
  <form id="form">
    <textarea id="content"></textarea>
    <br>
    <button type="submit">Approve</button>
    <span id="status"></span>
  </form>
  <script>
    fetch('/artifact')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('stage').textContent = 'Review: ' + data.stage;
        document.getElementById('content').value = data.content;
      });

    document.getElementById('form').addEventListener('submit', function(e) {
      e.preventDefault();
      var content = document.getElementById('content').value;
      document.querySelector('button').disabled = true;
      document.getElementById('status').textContent = 'Sending…';
      fetch('/approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({content: content})
      }).then(function() {
        document.body.innerHTML = '<h1>Approved. You may close this tab.</h1>';
      }).catch(function() {
        document.querySelector('button').disabled = false;
        document.getElementById('status').textContent = 'Error — please try again.';
      });
    });
  </script>
</body>
</html>
